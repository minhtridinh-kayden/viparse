# Generated by scripts/gtm/guerrilla_prep.py — review before PR
version: "0.1"

target:
  type: http
  # Override for real API: export AUDITAI_TARGET_URL=https://...
  url: "${AUDITAI_TARGET_URL:-http://127.0.0.1:18080/chat}"
  method: POST
  timeout_seconds: 120
  headers:
    Content-Type: application/json
  body_template:
    question: "{{question}}"
  response_map:
    answer: "answer"
    contexts: "contexts"

dataset:
  path: "./dataset.json"

metrics:
  faithfulness:
    enabled: true
    threshold: 0.75
    require_contexts: true
  answer_relevancy:
    enabled: true
    threshold: 0.70
  prompt_injection:
    enabled: true
    threshold: 0.90

# Default mock = offline, no external API.
# Opt-in real judge: set provider to xai|openai + export key (BYOK).
# Mock adapter is intentionally weak (SEED summary) — do not treat
# mock+green scores as product quality. Prefer real target + real judge.
judge:
  provider: mock
  model: "mock"
  temperature: 0
  # provider: xai
  # model: "grok-4.3"
  # provider: openai
  # model: "gpt-4o-mini"

run:
  concurrency: 2
  fail_on: average

output:
  dir: "./auditai-out"
  json: true
  markdown: true
  terminal: true
  top_failures: 5

cloud:
  enabled: null
